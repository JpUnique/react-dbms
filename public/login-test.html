<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test - DocManager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo img {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 10px;
        }
        
        .btn:hover {
            background: #5568d3;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        
        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
        
        .alert-info {
            background: #eef;
            color: #33c;
            border: 1px solid #ccf;
        }
        
        .debug-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .credentials {
            background: #fffbea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ffd700;
        }
        
        .credentials strong {
            color: #d97706;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/assets/images/logo.png" alt="DocManager Logo">
            <h1>DocManager Login Test</h1>
            <p class="subtitle">Direct localStorage Authentication Test</p>
        </div>
        
        <div class="credentials">
            <strong>Default Admin Credentials:</strong><br>
            Username: <code>admin</code><br>
            Password: <code>PdAdmin</code>
        </div>
        
        <div id="message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" value="admin" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" value="PdAdmin" required>
            </div>
            
            <button type="submit" class="btn">🔐 Test Login</button>
            <button type="button" class="btn btn-secondary" onclick="checkStorage()">🔍 Check Storage</button>
            <button type="button" class="btn btn-secondary" onclick="resetStorage()">🔄 Reset Storage</button>
        </form>
        
        <div id="debugInfo" class="debug-info" style="display: none;"></div>
    </div>

    <script>
        const USERS_STORAGE_KEY = 'docmanager_users';
        const AUTH_STORAGE_KEY = 'docmanager_auth';
        
        // Initialize admin user on page load
        function initializeAdmin() {
            const adminUser = {
                id: 'admin-1',
                name: 'Admin',
                email: 'admin',
                password: 'PdAdmin',
                role: 'admin',
                createdAt: new Date().toISOString()
            };
            
            localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify([adminUser]));
            console.log('Admin user initialized:', adminUser);
        }
        
        // Initialize on page load
        initializeAdmin();
        
        function showMessage(message, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `alert alert-${type}`;
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';
        }
        
        function showDebug(info) {
            const debugDiv = document.getElementById('debugInfo');
            debugDiv.textContent = info;
            debugDiv.style.display = 'block';
        }
        
        function checkStorage() {
            const usersStr = localStorage.getItem(USERS_STORAGE_KEY) || '[]';
            const users = JSON.parse(usersStr);
            
            let info = '=== STORAGE CHECK ===\n\n';
            info += `Storage Key: ${USERS_STORAGE_KEY}\n`;
            info += `Total Users: ${users.length}\n\n`;
            
            users.forEach((user, index) => {
                info += `User ${index + 1}:\n`;
                info += `  ID: ${user.id}\n`;
                info += `  Name: ${user.name}\n`;
                info += `  Username: ${user.email}\n`;
                info += `  Password: ${user.password}\n`;
                info += `  Role: ${user.role}\n`;
                info += `  Created: ${user.createdAt}\n\n`;
            });
            
            showDebug(info);
            showMessage(`Found ${users.length} user(s) in storage`, 'info');
        }
        
        function resetStorage() {
            initializeAdmin();
            localStorage.removeItem(AUTH_STORAGE_KEY);
            showMessage('Storage reset! Admin user recreated.', 'success');
            checkStorage();
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            console.log('Login attempt:', { username, password });
            
            // Get users from storage
            const usersStr = localStorage.getItem(USERS_STORAGE_KEY) || '[]';
            const users = JSON.parse(usersStr);
            
            console.log('Users in storage:', users);
            
            // Find matching user
            const user = users.find(u => u.email === username && u.password === password);
            
            let debugInfo = '=== LOGIN ATTEMPT ===\n\n';
            debugInfo += `Input Username: "${username}"\n`;
            debugInfo += `Input Password: "${password}"\n\n`;
            debugInfo += `Users in Storage: ${users.length}\n\n`;
            
            users.forEach((u, index) => {
                debugInfo += `User ${index + 1}:\n`;
                debugInfo += `  Username: "${u.email}"\n`;
                debugInfo += `  Password: "${u.password}"\n`;
                debugInfo += `  Username Match: ${u.email === username}\n`;
                debugInfo += `  Password Match: ${u.password === password}\n`;
                debugInfo += `  Both Match: ${u.email === username && u.password === password}\n\n`;
            });
            
            if (user) {
                debugInfo += '✅ LOGIN SUCCESSFUL!\n';
                debugInfo += `Logged in as: ${user.name} (${user.role})\n`;
                
                // Save to auth storage
                localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(user));
                
                showDebug(debugInfo);
                showMessage(`✅ Login successful! Welcome ${user.name}`, 'success');
                
                // Redirect to main app after 2 seconds
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } else {
                debugInfo += '❌ LOGIN FAILED!\n';
                debugInfo += 'No matching user found.\n';
                
                showDebug(debugInfo);
                showMessage('❌ Invalid username or password', 'error');
            }
        });
        
        // Show initial storage state
        checkStorage();
    </script>
</body>
</html>
